services:
  # Backend API service
  - type: web
    name: copilot-backend-api
    env: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: copilot-postgres-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: PORT
        value: 8000
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: ENABLE_DEV_AI_ENDPOINTS
        value: "false"
      - key: ENABLE_DEV_ADMIN_ENDPOINTS
        value: "false"
      - key: GEMINI_API_KEY
        sync: false # Set manually in Render Dashboard

databases:
  # Managed PostgreSQL database instance
  - name: copilot-postgres-db
    plan: free
    postgresMajorVersion: 15

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: copilot-postgres
    restart: always
    environment:
      POSTGRES_USER: copilot_user
      POSTGRES_PASSWORD: copilot_pass
      POSTGRES_DB: copilot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
